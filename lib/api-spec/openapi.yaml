openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RoVerse Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: games
    description: Roblox game management
  - name: users
    description: User management
  - name: planning
    description: Collaborative planning
  - name: teams
    description: Team management for scoped planning boards

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out

  /games:
    get:
      operationId: listGames
      tags: [games]
      summary: List all linked Roblox games
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"

    post:
      operationId: createGame
      tags: [games]
      summary: Link a Roblox game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameInput"
      responses:
        "201":
          description: Game linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{id}:
    get:
      operationId: getGame
      tags: [games]
      summary: Get a specific game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Not found

    patch:
      operationId: updateGame
      tags: [games]
      summary: Update a game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameUpdate"
      responses:
        "200":
          description: Updated game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

    delete:
      operationId: deleteGame
      tags: [games]
      summary: Unlink a game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /games/{id}/stats:
    get:
      operationId: getGameStats
      tags: [games]
      summary: Get real-time stats for a game (CCU, visits, favorites)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Game stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStats"

  /games/dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [games]
      summary: Get aggregated stats across all games
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all platform users
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: createUser
      tags: [users]
      summary: Add a user manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role, subroles, or groups
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Remove a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /planning/teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List all teams with their members
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /planning/teams/{id}:
    patch:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamUpdate"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

    delete:
      operationId: deleteTeam
      tags: [teams]
      summary: Delete a team (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /planning/teams/{id}/members:
    post:
      operationId: addTeamMember
      tags: [teams]
      summary: Add a member to a team (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamMemberInput"
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /planning/teams/{id}/members/{userId}:
    delete:
      operationId: removeTeamMember
      tags: [teams]
      summary: Remove a member from a team (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /planning/my-teams:
    get:
      operationId: getMyTeams
      tags: [teams]
      summary: Get current user's team IDs
      responses:
        "200":
          description: List of team IDs the user belongs to
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /planning/boards:
    get:
      operationId: listBoards
      tags: [planning]
      summary: List all planning boards
      responses:
        "200":
          description: Boards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Board"

    post:
      operationId: createBoard
      tags: [planning]
      summary: Create a new board
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoardInput"
      responses:
        "201":
          description: Created board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

  /planning/boards/{id}:
    get:
      operationId: getBoard
      tags: [planning]
      summary: Get a board with its columns and tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Board with columns and tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardDetail"

    patch:
      operationId: updateBoard
      tags: [planning]
      summary: Update a board
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoardUpdate"
      responses:
        "200":
          description: Updated board
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"

    delete:
      operationId: deleteBoard
      tags: [planning]
      summary: Delete a board
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /planning/boards/{boardId}/columns:
    post:
      operationId: createBoardColumn
      tags: [planning]
      summary: Add a column to a board
      parameters:
        - name: boardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColumnInput"
      responses:
        "201":
          description: Created column
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardColumn"

  /planning/columns/{id}:
    patch:
      operationId: updateBoardColumn
      tags: [planning]
      summary: Rename or reorder a column
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ColumnUpdate"
      responses:
        "200":
          description: Updated column
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardColumn"

    delete:
      operationId: deleteBoardColumn
      tags: [planning]
      summary: Delete a column and its tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /planning/tasks:
    get:
      operationId: listTasks
      tags: [planning]
      summary: List tasks, optionally filtered by board
      parameters:
        - name: boardId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

    post:
      operationId: createTask
      tags: [planning]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /planning/tasks/{id}:
    get:
      operationId: getTask
      tags: [planning]
      summary: Get a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    patch:
      operationId: updateTask
      tags: [planning]
      summary: Update a task (move column, assign, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

    delete:
      operationId: deleteTask
      tags: [planning]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /planning/events:
    get:
      operationId: listEvents
      tags: [planning]
      summary: List calendar events
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"

    post:
      operationId: createEvent
      tags: [planning]
      summary: Create a calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /planning/events/{id}:
    patch:
      operationId: updateEvent
      tags: [planning]
      summary: Update a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

    delete:
      operationId: deleteEvent
      tags: [planning]
      summary: Delete a calendar event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /groups/{groupId}:
    get:
      operationId: getGroupInfo
      tags: [groups]
      summary: Get Roblox group info with games and stats
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupInfo"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    User:
      type: object
      required: [id, robloxId, robloxUsername, role, createdAt]
      properties:
        id:
          type: integer
        robloxId:
          type: string
        robloxUsername:
          type: string
        robloxDisplayName:
          type: ["string", "null"]
        robloxAvatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, collaborator]
        subroles:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [robloxId, role]
      properties:
        robloxId:
          type: string
        role:
          type: string
          enum: [admin, collaborator]
        subroles:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            type: string

    UserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [admin, collaborator]
        subroles:
          type: array
          items:
            type: string
        groups:
          type: array
          items:
            type: string

    Game:
      type: object
      required: [id, robloxGameId, name, createdAt]
      properties:
        id:
          type: integer
        robloxGameId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        gameLink:
          type: ["string", "null"]
        groupLink:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    GameInput:
      type: object
      required: [robloxGameId, name]
      properties:
        robloxGameId:
          type: string
        name:
          type: string
        description:
          type: string
        gameLink:
          type: string
        groupLink:
          type: string

    GameUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        gameLink:
          type: ["string", "null"]
        groupLink:
          type: ["string", "null"]
        isActive:
          type: boolean

    GameStats:
      type: object
      required: [gameId, ccu]
      properties:
        gameId:
          type: integer
        ccu:
          type: integer
        peakCcu:
          type: integer
        visits:
          type: integer
        favoritedCount:
          type: integer
        isLive:
          type: boolean
        ccuHistory:
          type: array
          items:
            $ref: "#/components/schemas/TimeseriesPoint"

    TimeseriesPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number

    DashboardSummary:
      type: object
      required: [totalGames, totalCcu]
      properties:
        totalGames:
          type: integer
        totalCcu:
          type: integer
        topGame:
          $ref: "#/components/schemas/Game"

    Team:
      type: object
      required: [id, name, color, createdAt, members]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string
        createdAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"

    TeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    TeamUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string

    TeamMember:
      type: object
      required: [userId, username, role]
      properties:
        userId:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, collaborator]

    AddTeamMemberInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    Board:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        teamId:
          type: ["integer", "null"]
        teamName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    BoardInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string
        teamId:
          type: integer

    BoardUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]

    BoardColumn:
      type: object
      required: [id, boardId, name, position]
      properties:
        id:
          type: integer
        boardId:
          type: integer
        name:
          type: string
        position:
          type: integer

    BoardDetail:
      type: object
      required: [id, name, columns, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnWithTasks"
        createdAt:
          type: string
          format: date-time

    ColumnWithTasks:
      type: object
      required: [id, boardId, name, position, tasks]
      properties:
        id:
          type: integer
        boardId:
          type: integer
        name:
          type: string
        position:
          type: integer
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    Task:
      type: object
      required: [id, boardId, columnId, title, position, createdAt]
      properties:
        id:
          type: integer
        boardId:
          type: integer
        columnId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        assigneeId:
          type: ["integer", "null"]
        assigneeUsername:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        dueDate:
          type: ["string", "null"]
          format: date
        position:
          type: integer
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    TaskInput:
      type: object
      required: [boardId, columnId, title]
      properties:
        boardId:
          type: integer
        columnId:
          type: integer
        title:
          type: string
        description:
          type: string
        assigneeId:
          type: integer
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date
        tags:
          type: array
          items:
            type: string

    TaskUpdate:
      type: object
      properties:
        columnId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        assigneeId:
          type: ["integer", "null"]
        priority:
          type: ["string", "null"]
          enum: [low, medium, high, null]
        dueDate:
          type: ["string", "null"]
          format: date
        position:
          type: integer
        tags:
          type: array
          items:
            type: string

    CalendarEvent:
      type: object
      required: [id, title, startDate, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: ["string", "null"]
          format: date-time
        color:
          type: ["string", "null"]
        assigneeId:
          type: ["integer", "null"]
        allDay:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CalendarEventInput:
      type: object
      required: [title, startDate]
      properties:
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        color:
          type: string
        assigneeId:
          type: integer
        allDay:
          type: boolean

    CalendarEventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: ["string", "null"]
          format: date-time
        color:
