services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rocheck
      POSTGRES_PASSWORD: rocheck123
      POSTGRES_DB: rocheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rocheck -d rocheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://rocheck:rocheck123@postgres:5432/rocheck
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
